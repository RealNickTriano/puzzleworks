name: Daily puzzle

on:
  schedule:
    - cron: "17 5 * * *"   # every day at 05:17 UTC (odd minute avoids the top-of-hour rush)
  workflow_dispatch: {}     # lets you trigger a puzzle manually from the Actions tab

permissions:
  contents: write   # to commit the new puzzle
  models: read      # for the free GitHub Models fallback

concurrency:
  group: daily-puzzle
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Install headless Chromium (for validation)
        run: npx playwright install --with-deps chromium

      - name: Generate and validate today's puzzle
        env:
          # Optional: add this secret for higher-quality puzzles via the Claude API.
          # Without it, the script falls back to GitHub Models (free).
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # PUZZLE_MODEL: claude-sonnet-4-6   # uncomment to pin a specific model
        run: node scripts/daily.mjs

      - name: Commit and push
        run: |
          git config user.name "puzzle-bot"
          git config user.email "actions@users.noreply.github.com"
          git add puzzles manifest.json
          if git diff --cached --quiet; then
            echo "No new puzzle to commit."
          else
            git commit -m "Daily puzzle $(date -u +%F)"
            git push
          fi
