<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OnlyPuzzles — a new machine-made puzzle every morning</title>
<meta name="description" content="A brand-new browser puzzle, invented and coded by an AI, published every day.">
<style>
  :root{
    --paper:#edf1f4; --paper-line:#dfe6ec;
    --ink:#1f2c3a; --ink-soft:#5b6b7c;
    --gold:#c98a12; --card:#fff;
    --shadow:0 1px 2px rgba(31,44,58,.08), 0 6px 18px rgba(31,44,58,.08);
  }
  *{box-sizing:border-box;}
  body{
    margin:0; color:var(--ink);
    font-family:"Avenir Next","Segoe UI",system-ui,-apple-system,sans-serif;
    background:
      linear-gradient(var(--paper-line) 1px, transparent 1px) 0 0/100% 28px,
      linear-gradient(90deg, var(--paper-line) 1px, transparent 1px) 0 0/28px 100%,
      var(--paper);
    min-height:100vh;
  }
  .wrap{ max-width:680px; margin:0 auto; padding:40px 20px 60px; }
  h1{
    font-family:Georgia,"Times New Roman",serif;
    font-size:clamp(34px,7vw,52px); letter-spacing:.1em; margin:0; text-align:center;
  }
  h1 .num{ color:var(--gold); }
  .sub{ text-align:center; color:var(--ink-soft); margin:8px 0 40px; font-size:15px; }

  .today{
    background:var(--card); border-radius:18px; box-shadow:var(--shadow);
    padding:30px 30px 26px; margin-bottom:44px; position:relative; overflow:hidden;
  }
  .today::before{
    content:""; position:absolute; inset:0 0 auto 0; height:5px; background:var(--gold);
  }
  .kicker{ font-size:11px; letter-spacing:.18em; text-transform:uppercase; color:var(--gold); font-weight:700; margin:0 0 8px;}
  .today h2{ font-family:Georgia,serif; font-size:clamp(24px,5vw,34px); margin:0 0 6px; letter-spacing:.02em;}
  .today .tag{ color:var(--ink-soft); margin:0 0 20px; font-size:16px; line-height:1.45;}
  .meta{ font-size:12px; color:var(--ink-soft); letter-spacing:.06em; }
  .play{
    display:inline-block; font-weight:700; font-size:16px;
    background:var(--ink); color:#fff; text-decoration:none;
    padding:13px 30px; border-radius:999px; margin-right:14px;
    transition:transform .1s ease, background-color .15s ease;
  }
  .play:hover{ background:var(--gold); }
  .play:active{ transform:scale(.97); }

  h3.archive-h{
    font-family:Georgia,serif; font-size:15px; letter-spacing:.18em; text-transform:uppercase;
    color:var(--ink-soft); border-bottom:1.5px solid var(--ink); padding-bottom:8px; margin:0 0 4px;
  }
  .row{
    display:flex; align-items:baseline; gap:16px;
    padding:16px 4px; border-bottom:1px solid var(--paper-line);
    text-decoration:none; color:inherit;
  }
  .row:hover{ background:rgba(255,255,255,.75); }
  .row .d{ font-variant-numeric:tabular-nums; font-size:13px; color:var(--ink-soft); min-width:86px; }
  .row .t{ font-weight:700; font-size:17px; }
  .row .g{ color:var(--ink-soft); font-size:14px; flex:1; min-width:0;
           white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .row .diff{
    font-size:10px; letter-spacing:.1em; text-transform:uppercase; font-weight:700;
    padding:3px 9px; border-radius:999px; border:1px solid var(--ink-soft); color:var(--ink-soft);
  }
  .row .diff.hard{ border-color:var(--gold); color:var(--gold); }

  .state{ text-align:center; color:var(--ink-soft); padding:40px 0; }
  footer{ text-align:center; color:var(--ink-soft); font-size:13px; margin-top:56px; line-height:1.6;}
  @media (max-width:520px){ .row .g{ display:none; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>ONLY<span class="num">PUZZLES</span></h1>
  <p class="sub">A brand-new puzzle, invented and coded by an AI, every morning.</p>

  <div id="today"></div>

  <h3 class="archive-h">Previous days</h3>
  <div id="archive"><p class="state">Loading puzzles…</p></div>

  <footer>
    Every puzzle here — rules, code, and design — is generated by a language model,<br>
    validated automatically, and published without human edits.
  </footer>
</div>

<script>
(async () => {
  const todayEl = document.getElementById('today');
  const archEl = document.getElementById('archive');
  const fmt = d => new Date(d + 'T12:00:00Z')
    .toLocaleDateString(undefined, { month:'short', day:'numeric', year:'numeric' });
  const esc = s => String(s ?? '').replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

  let data;
  try {
    const res = await fetch('manifest.json?t=' + Date.now());
    if (!res.ok) throw new Error(res.status);
    data = await res.json();
  } catch {
    archEl.innerHTML = '<p class="state">Couldn\u2019t load the puzzle list. Refresh to try again.</p>';
    return;
  }

  const puzzles = (data.puzzles || []).slice()
    .sort((a, b) => b.date.localeCompare(a.date));
  if (!puzzles.length) {
    archEl.innerHTML = '<p class="state">No puzzles yet \u2014 the first one arrives tomorrow morning.</p>';
    return;
  }

  const [latest, ...rest] = puzzles;
  todayEl.innerHTML = `
    <div class="today">
      <p class="kicker">Today\u2019s puzzle \u00b7 ${fmt(latest.date)}</p>
      <h2>${esc(latest.title)}</h2>
      <p class="tag">${esc(latest.tagline)}</p>
      <a class="play" href="${esc(latest.file)}">Play</a>
      <span class="meta">difficulty: ${esc(latest.difficulty || 'medium')}</span>
    </div>`;

  archEl.innerHTML = rest.length
    ? rest.map(p => `
        <a class="row" href="${esc(p.file)}">
          <span class="d">${fmt(p.date)}</span>
          <span class="t">${esc(p.title)}</span>
          <span class="g">${esc(p.tagline)}</span>
          <span class="diff ${esc(p.difficulty)}">${esc(p.difficulty || 'medium')}</span>
        </a>`).join('')
    : '<p class="state">The archive starts filling up tomorrow.</p>';
})();
</script>
</body>
</html>
